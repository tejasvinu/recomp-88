<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e0e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Recomp 88" />
    <meta name="description" content="7-day body recomposition workout tracker with exercise wiki and progress charts" />
    <title>Recomp 88</title>
    <style>
      #splash-screen {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #0e0e0e;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-in-out;
      }
      .splash-logo {
        width: 120px;
        height: 120px;
        border-radius: 20%;
        margin-bottom: 24px;
        animation: pulse 2s infinite;
        box-shadow: 0 0 40px rgba(163, 230, 53, 0.2);
      }
      .splash-loader {
        width: 40px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .splash-loader::after {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 50%;
        background: #a3e635; /* lime-400 */
        border-radius: 4px;
        animation: slide 1.5s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.95); opacity: 0.8; }
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
      body { margin: 0; background: #0e0e0e; }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <img src="/icon-512.png" alt="Recomp 88 Logo" class="splash-logo" />
      <div class="splash-loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Automatically hide the splash screen slightly after the main script loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash-screen');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }
        }, 500);
      });
    </script>
  </body>
</html>
