  <style>
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #080808;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), visibility 0.6s;
    }

    .splash-logo {
      width: 120px;
      height: 120px;
      border-radius: 20%;
      margin-bottom: 24px;
      box-shadow: 0 0 30px rgba(163, 230, 53, 0.2);
      opacity: 0;
      transform: translateY(20px) scale(0.9);
      animation: appear 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards, float 3s ease-in-out infinite alternate 0.6s, pulse-glow 2s infinite alternate 0.6s;
    }

    .splash-title {
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(10px);
      animation: appear 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .splash-loader {
      width: 48px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      opacity: 0;
      animation: appear 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .splash-loader::after {
      content: '';
      position: absolute;
      left: -50%;
      top: 0;
      bottom: 0;
      width: 50%;
      background: #a3e635;
      /* lime-400 */
      border-radius: 4px;
      animation: slide 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes float {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-10px);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 30px rgba(163, 230, 53, 0.2);
      }

      50% {
        box-shadow: 0 0 50px rgba(163, 230, 53, 0.4);
      }
    }

    @keyframes slide {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(300%);
      }
    }

    @keyframes appear {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    body {
      margin: 0;
      background: #080808;
    }
  </style>

<body>
  <div id="splash-screen">
    <img src="/icon-512.png" alt="Recomp 88 Logo" class="splash-logo" />
    <div class="splash-title">Recomp 88</div>
    <div class="splash-loader"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Automatically hide the splash screen slightly after the main script loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0';
          splash.style.visibility = 'hidden';
          setTimeout(() => splash.remove(), 600);
        }
      }, 300);
    });
  </script>
</body>
